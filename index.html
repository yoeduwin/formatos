<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejecutiva Ambiental - Formatos de Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(160deg, #4a3f7a 0%, #6b5b9e 40%, #7c6fa0 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 24px 60px;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            margin-bottom: 44px;
        }

        .header img {
            max-width: 160px;
            height: auto;
            margin-bottom: 14px;
            filter: brightness(0) invert(1);
            opacity: 0.92;
        }

        .header h1 {
            color: white;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1.5px;
        }

        .header p {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-top: 5px;
        }

        /* ── APP GRID ── */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 160px);
            gap: 24px;
            justify-content: center;
        }

        /* ── APP CARD ── */
        .app-card {
            background: white;
            border-radius: 16px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 16px 20px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.18);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            cursor: pointer;
        }

        .app-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.28);
        }

        .app-card:active {
            transform: translateY(-2px);
        }

        /* Icon container */
        .app-icon {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .app-icon svg {
            width: 38px;
            height: 38px;
        }

        /* Individual icon colors */
        .icon-blue   { background: #E3F2FD; }
        .icon-green  { background: #E8F5E9; }
        .icon-orange { background: #FFF3E0; }
        .icon-purple { background: #F3E5F5; }

        /* Card text */
        .app-name {
            color: #1a1a2e;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            line-height: 1.4;
            letter-spacing: 0.2px;
        }

        .app-sub {
            color: #888;
            font-size: 10px;
            text-align: center;
            margin-top: 5px;
            line-height: 1.3;
        }

        /* Solo-lectura badge on the card */
        .readonly-pill {
            margin-top: 8px;
            background: #F3E5F5;
            color: #7B1FA2;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 9px;
            border-radius: 10px;
            letter-spacing: 0.4px;
        }

        /* ── FOOTER ── */
        .footer-text {
            margin-top: 48px;
            color: rgba(255,255,255,0.45);
            font-size: 10px;
            text-align: center;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 720px) {
            .app-grid {
                grid-template-columns: repeat(2, 140px);
                gap: 16px;
            }
        }

        @media (max-width: 360px) {
            .app-grid {
                grid-template-columns: repeat(2, 130px);
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="assets/logo.png" alt="Ejecutiva Ambiental"
             onerror="this.style.display='none'">
        <h1>EJECUTIVA AMBIENTAL</h1>
        <p>Sistema de Formatos de Control Documental</p>
    </div>

    <div class="app-grid">

        <!-- 1. SALIDA Y ENTRADA DE EQUIPOS -->
        <a href="registro-equipos.html" class="app-card">
            <span class="app-icon icon-blue">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="7" width="20" height="13" rx="2" fill="#1565C0" opacity="0.15"/>
                    <rect x="2" y="7" width="20" height="13" rx="2" stroke="#1565C0" stroke-width="1.5" fill="none"/>
                    <path d="M6 7V5a6 6 0 0112 0v2" stroke="#1565C0" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="12" cy="13.5" r="2.5" fill="#1976D2"/>
                    <path d="M12 16v2" stroke="#1976D2" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="app-name">Salida y Entrada<br>de Equipos</span>
            <span class="app-sub">EA-FCEQ-03.05</span>
        </a>

        <!-- 2. SUPERVISIÓN DE GABINETE -->
        <a href="supervision-gabinete.html" class="app-card">
            <span class="app-icon icon-green">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="3" width="18" height="18" rx="3" fill="#2E7D32" opacity="0.12"/>
                    <rect x="3" y="3" width="18" height="18" rx="3" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
                    <path d="M7 12l3.5 3.5L17 8.5" stroke="#388E3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
            <span class="app-name">Supervisión<br>de Gabinete</span>
            <span class="app-sub">EA-FSDG-12.01</span>
        </a>

        <!-- 3. FORMATOS NOM-081 -->
        <a href="nom-081.html" class="app-card">
            <span class="app-icon icon-orange">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 18V5l12-2v13" stroke="#E65100" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="6" cy="18" r="3" fill="#F57C00" opacity="0.25" stroke="#F57C00" stroke-width="1.5"/>
                    <circle cx="18" cy="16" r="3" fill="#F57C00" opacity="0.25" stroke="#F57C00" stroke-width="1.5"/>
                </svg>
            </span>
            <span class="app-name">Formatos<br>NOM-081</span>
            <span class="app-sub">SEMARNAT-1994</span>
        </a>

        <!-- 4. PROCEDIMIENTOS Y DOCUMENTOS EXTERNOS -->
        <a href="https://drive.google.com/drive/folders/1e2OTx3GOSw7Kd59dYJ_6C0NZdwv-l6ZF?usp=sharing"
           target="_blank" rel="noopener" class="app-card">
            <span class="app-icon icon-purple">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z" fill="#7B1FA2" opacity="0.15" stroke="#7B1FA2" stroke-width="1.5"/>
                    <circle cx="12" cy="13" r="2" stroke="#7B1FA2" stroke-width="1.5" fill="none"/>
                    <path d="M8 13s1.5-3 4-3 4 3 4 3-1.5 3-4 3-4-3-4-3z" stroke="#7B1FA2" stroke-width="1.3" stroke-linecap="round" fill="none"/>
                </svg>
            </span>
            <span class="app-name">Procedimientos<br>y Documentos</span>
            <span class="app-sub">Documentos Externos</span>
            <span class="readonly-pill">SOLO LECTURA</span>
        </a>

    </div>

    <p class="footer-text">Laboratorio de Pruebas &bull; Sistema de Gestión de Calidad</p>

</body>
</html>
